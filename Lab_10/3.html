<!doctype html>
<html>
  <head>
    <title>Lab_10</title>
  </head>
  <body>
    <h2>Select Roll Numbers</h2>

    <input type="checkbox" value="101" onchange="showSelected()" /> 101 <br />
    <input type="checkbox" value="102" onchange="showSelected()" /> 102 <br />
    <input type="checkbox" value="103" onchange="showSelected()" /> 103 <br />
    <input type="checkbox" value="104" onchange="showSelected()" /> 104 <br />
    <input type="checkbox" value="105" onchange="showSelected()" /> 105
    <br /><br />

    <h3>Selected Roll Numbers:</h3>
    <p id="result">None</p>

    <script>
      function showSelected() {
        let checkboxes = document.querySelectorAll("input[type='checkbox']");
        let selected = [];

        checkboxes.forEach(function (cb) {
          if (cb.checked) {
            selected.push(cb.value);
          }
        });

        document.getElementById("result").innerHTML =
          selected.length > 0 ? selected.join(", ") : "None";
      }
    </script>
  </body>
</html>
