<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2</title>
  </head>
  <body>
    <script>
      let n = parseInt(prompt("Enter Number is: "));
      let count = 0;
      for (let i = 1; i <= n; i++) {
        if (n % i == 0) {
          count++;
        }
      }
      if (count == 2) {
        alert(n + " Number is prime");
      } else {
        alert("Number is Not prime");
      }
    </script>
  </body>
</html>
