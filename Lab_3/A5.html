<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A5</title>
  </head>
  <body>
    <script>
      let n = parseInt(prompt("Enter number is: "));
      let rem, rev=0;
      let temp = n;
      while (n != 0) {
        rem = n % 10;
        rev = (rev * 10) + rem;
        n = parseInt(n / 10);
      }
      if (rev == temp) {
        alert("Number is palindrome");
      } else {
        alert("Number is not palindrome");
      }
    </script>
  </body>
</html>
