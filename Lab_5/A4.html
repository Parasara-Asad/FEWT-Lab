<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A4</title>
  </head>
  <body>
    <script>
      function quicksort(arr) {
        if (arr.length < 1) {
          return arr;
        }
        let pivot = arr[arr.length - 1];
        let right = [];
        let left = [];

        for (let i = 0; i < arr.length - 1; i++) {
          if (pivot < arr[i]) {
            right.push(arr[i]);
          } else {
            left.push(arr[i]);
          }
        }

        return [...quicksort(left), pivot, ...quicksort(right)];
      }

      let n = parseInt(prompt("Enter arr size: "));
      let arr = [];
      for (let i = 0; i < n; i++) {
        arr[i] = parseInt(prompt("Enter element: "));
      }
      let sortarr = quicksort(arr);
      document.write(sortarr);
    </script>
  </body>
</html>
