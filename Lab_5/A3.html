<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A3</title>
  </head>
  <body>
    <script>
      let n = parseInt(prompt("Enter arr size: "));
      let arr = [];
      for (let i = 0; i < n; i++) {
        arr[i] = parseInt(prompt("Enter element: "));
      }
      for (let i = 0; i < arr.length - 1; i++) {
        for (let j = 0; j < arr.length - i + 1; j++) {
          if (arr[j] > arr[j + 1]) {
            temp = arr[j];
            arr[j] = arr[j + 1];
            arr[j + 1] = temp;
          }
        }
      }
      document.write(" " + arr);
    </script>
  </body>
</html>
