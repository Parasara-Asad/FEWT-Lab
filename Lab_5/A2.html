<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2</title>
  </head>
  <body>
    <script>
      let n = parseInt(prompt("Enter arr size: "));
      let arr = [];
      for (let i = 0; i < n; i++) {
        arr[i] = parseInt(prompt("Enter element: "));
      }
      for (let i = 0; i < arr.length; i++) {
        for (let j = i + 1; j < arr.length; j++) {
          if (arr[i] > arr[j]) {
            temp = arr[i];
            arr[i] = arr[j];
            arr[j] = temp;
          }
        }
      }
      for (let i = 0; i < arr.length; i++) {
        document.write(" " + arr[i]);
      }
    </script>
  </body>
</html>
