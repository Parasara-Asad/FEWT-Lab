let currentIndex = 0;
let selectedAnswers = new Array(questions.length).fill(null);
let answerShown = false;

document.getElementById("totalQuestion").innerText = questions.length;

loadQuestion();

// Load Question
function loadQuestion() {

    
console.log("loadQuestion called",questions.length);
    answerShown = false;

    const q = questions[currentIndex];

    document.getElementById("question").textContent = q.question;

    document.getElementById("difficulty").innerText = q.level;

    document.getElementById("currentQuestion").innerText = currentIndex + 1;

    document.getElementById("progressBar").style.width =
        ((currentIndex + 1) / questions.length) * 100 + "%";

    let html = "";

    for (let i = 0; i < q.options.length; i++) {

        html += `
        <button class="option"
        id="option${i}"
        onclick="selectOption(${i})">

        ${q.options[i]}

        </button>
        `;
    }

    document.getElementById("options").innerHTML = html;

    if (selectedAnswers[currentIndex] !== null) {

        document
            .getElementById("option" + selectedAnswers[currentIndex])
            .classList.add("selected");

    }

}

// Select Option
function selectOption(index) {

    if (answerShown)
        return;

    let all = document.getElementsByClassName("option");

    for (let btn of all) {

        btn.classList.remove("selected");

    }

    document
        .getElementById("option" + index)
        .classList.add("selected");

    selectedAnswers[currentIndex] = index;

}

// Show Answer
function showAnswer() {

    if (answerShown)
        return;

    answerShown = true;

    let q = questions[currentIndex];

    let all = document.getElementsByClassName("option");

    for (let i = 0; i < all.length; i++) {

        if (i == q.answer) {

            all[i].classList.add("correct");

        }

    }

    if (
        selectedAnswers[currentIndex] !== null &&
        selectedAnswers[currentIndex] != q.answer
    ) {

        document
            .getElementById(
                "option" + selectedAnswers[currentIndex]
            )
            .classList.add("wrong");

    }

}

// Next
function nextQuestion() {

    if (currentIndex < questions.length - 1) {

        currentIndex++;

        loadQuestion();

    }

}

// Previous
function previousQuestion() {

    if (currentIndex > 0) {

        currentIndex--;

        loadQuestion();

    }

}

// Submit
function submitQuiz() {

    let score = 0;

    for (let i = 0; i < questions.length; i++) {

        if (selectedAnswers[i] == questions[i].answer) {

            score++;

        }

    }

    let percentage = (score / questions.length) * 100;

    let message = "";

    if (percentage >= 80) {

        message = "🎉 Excellent!";

    }
    else if (percentage >= 60) {

        message = "👍 Good Job!";

    }
    else {

        message = "📚 Needs Improvement.";

    }

    document.getElementById("result").innerHTML = `
    <h2>Quiz Finished</h2>

    <br>

    Score : <b>${score}</b> / ${questions.length}

    <br><br>

    Percentage : <b>${percentage.toFixed(2)}%</b>

    <br><br>

    ${message}

    <br><br>

    <button onclick="restartQuiz()">
    Restart Quiz
    </button>
    `;

}

// Restart
function restartQuiz() {

    currentIndex = 0;

    selectedAnswers = new Array(questions.length).fill(null);

    document.getElementById("result").innerHTML = "";

    loadQuestion();

}
