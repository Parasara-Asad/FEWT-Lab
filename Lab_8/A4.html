<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A4</title>
    <style>
      .form-container {
        width: 400px;
        margin: 30px auto;
        background: white;
        padding: 20px;
        border: 2px solid black;
      }
      input {
        width: 100%;
        padding: 4px;
      }

      button {
        width: 50%;
        height: 5vh;
        margin-top: 10px;
        background: rgb(67, 157, 67);
        border:2px solid black;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>Student Registration</h2>

      <form onsubmit="return validateForm();">
        <label>Username</label>
        <input type="text" id="username" />

        <label>Enrollment No</label>
        <input type="text" id="enrollment" />

        <label>Email</label>
        <input type="text" id="email" />

        <label>Date of Birth</label>
        <input type="date" id="dob" />

        <label>Password</label>
        <input type="password" id="password" />

        <label>Confirm Password</label>
        <input type="password" id="confirm" />

        <button type="submit">Register</button>
      </form>

      <ul id="errorDisplay"></ul>
    </div>

    <script>
      function validateForm() {
        let username = document.getElementById("username").value;
        let enrollment = document.getElementById("enrollment").value;
        let email = document.getElementById("email").value;
        let dob = document.getElementById("dob").value;
        let password = document.getElementById("password").value;
        let confirm = document.getElementById("confirm").value;

        let errorDisplay = document.getElementById("errorDisplay");
        errorDisplay.innerHTML = "";

        let errors = [];

        if (username.length < 8) {
          errors.push("Username must be at least 8 characters.");
        }

        if (enrollment.length != 11 || isNaN(enrollment)) {
          errors.push("Enrollment must be 11 digits.");
        }

        let emailPattern = /^[a-zA-Z0-9]+@[a-zA-Z]+\.[a-zA-Z]{2,}$/;

        if (!emailPattern.test(email)) {
          errors.push("Invalid Email.");
        }

        if (password.length < 8 || password.length > 12) {
          errors.push("Password must be 8 to 12 characters.");
        }

        if (!/\d/.test(password)) {
          errors.push("Password needs one digit.");
        }

        if (!/[^A-Za-z0-9]/.test(password)) {
          errors.push("Password needs one special character.");
        }

        if (password != confirm) {
          errors.push("Passwords do not match.");
        }

        let birth = new Date(dob);
        let today = new Date();
        let age = today.getFullYear() - birth.getFullYear();

        if (age < 18) {
          errors.push("Age must be 18 or above.");
        }

        if (errors.length > 0) {
          for (let i = 0; i < errors.length; i++) {
            errorDisplay.innerHTML += "<li>" + errors[i] + "</li>";
          }

          return false;
        }

        alert("Validation Successful!");
        return true;
      }
    </script>
  </body>
</html>
