<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2</title>
    <style>
      button {
        height: 50px;
        width: 30%;
      }
    </style>
  </head>
  <body>
    <button id="btn" onclick="btnclick()">Click Me</button>
    <h1 id="h1">Hello world</h1>
    <script>
        function btnclick(){
            document.getElementById("btn").addEventListener('dblclick',function (){
                let h1 = document.getElementById("h1").innerHTML = "Event is dblclick";
            })
            document.getElementById("btn").addEventListener("mousedown" ,function(){
                let h1 = document.getElementById("h1").innerHTML = "Event is mousedown";
            })
            document.getElementById("btn").addEventListener("mousemove",function (){
                let h1 = document.getElementById("h1").innerHTML = "Event is mousemove";
            })
            document.getElementById("btn").addEventListener("mouseup",function (){
                let h1 = document.getElementById("h1").innerHTML = "Event is mouseup";
            })
            document.getElementById("btn").addEventListener("mouseleave",function (){
                let h1 = document.getElementById("h1").innerHTML = "Event is mouseleave";
            })
            document.getElementById("btn").addEventListener("mouseover",function (){
                let h1 = document.getElementById("h1").innerHTML = "Event is mouseover";
            })
        }
    </script>
  </body>
</html>
