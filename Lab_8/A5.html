<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A5</title>
    <style>
        input{
            width: 30%;
            height: 50px;
        }
        *{
            font-size: larger;
        }
    </style>
  </head>
  <body>
    <form action="">
      <input type="text" id="inp" />
    </form>
    <h3 id="h3"></h3>
    <script>
        let inp = document.getElementById("inp");
        inp.addEventListener("keydown",  function (event){
            document.getElementById("h3").innerHTML = "Press key is: "+ event.key;
        })
    </script>
  </body>
</html>
