<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Management System</title>

    <link rel="stylesheet" href="./index.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="background"></div>

    <div class="container">
      <header>
        <div class="logo">
          <i class="fa-solid fa-user-check"></i>

          <h1>Attendance Management</h1>
        </div>

        <div class="dateTime">
          <div id="currentDate"></div>

          <div id="currentTime"></div>
        </div>
      </header>

      <div class="setupCard">
        <h2>Attendance Setup</h2>

        <div class="inputGroup">
          <div>
            <label>Start Roll Number</label>

            <input
              type="number"
              id="startRoll"
              placeholder="Enter Start Roll"
            />
          </div>

          <div>
            <label>End Roll Number</label>

            <input type="number" id="endRoll" placeholder="Enter End Roll" />
          </div>
        </div>
        <button id="startAttendance">
          <i class="fa-solid fa-play"></i>

          Start Attendance
        </button>
      </div>

      <div class="dashboard" id="dashboard">
        <div class="studentCard">
          <div class="avatar">
            <i class="fa-solid fa-user-graduate"></i>
          </div>

          <div class="studentInfo">
            <h2 id="studentName">Student 1</h2>

            <p>
              Roll Number :

              <span id="rollNumber"> 1 </span>
            </p>

            <p>Department : Computer Engineering</p>

            <p>Semester : 5</p>

            <p>Section : A</p>
          </div>
        </div>

        <div class="bigRollCard">
          <div class="rollTitle">CURRENT ROLL</div>

          <div id="bigRoll">1</div>
        </div>

        <div class="stats">
          <div class="card blue">
            <h3>Total</h3>

            <h1 id="totalCount">0</h1>
          </div>

          <div class="card green">
            <h3>Present</h3>

            <h1 id="presentCount">0</h1>
          </div>

          <div class="card red">
            <h3>Absent</h3>

            <h1 id="absentCount">0</h1>
          </div>

          <div class="card orange">
            <h3>Remaining</h3>

            <h1 id="remainingCount">0</h1>
          </div>
        </div>

        <div class="progressBox">
          <div class="progressText">
            Attendance Progress

            <span id="progressPercent"> 0% </span>
          </div>

          <div class="progressBar">
            <div id="progressFill"></div>
          </div>
        </div>

        <div class="buttons">
          <button id="presentBtn" class="present">
            <i class="fa-solid fa-check"></i>

            Present
          </button>

          <button id="absentBtn" class="absent">
            <i class="fa-solid fa-xmark"></i>

            Absent
          </button>
        </div>

        <div class="navigation">
          <button id="previousBtn">
            <i class="fa-solid fa-arrow-left"></i>

            Previous
          </button>

          <button id="repeatVoice">
            <i class="fa-solid fa-volume-high"></i>

            Speak
          </button>

          <button id="nextBtn">
            Next

            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>

        <div class="searchBox">
          <input
            type="number"
            id="jumpRoll"
            placeholder="Jump To Roll Number"
          />

          <button id="jumpBtn">Go</button>
        </div>

        <div class="tableCard">
          <h2>Attendance Record</h2>

          <table>
            <thead>
              <tr>
                <th>Roll</th>

                <th>Student</th>

                <th>Status</th>
              </tr>
            </thead>

            <tbody id="attendanceTable"></tbody>
          </table>
        </div>

        <div class="downloadSection">
          <button id="confirmAttendance" class="confirm" style="display: none">
            <i class="fa-solid fa-circle-check"></i>

            Confirm Attendance
          </button>

          <button id="downloadCSV" class="download" style="display: none">
            <i class="fa-solid fa-download"></i>

            Download CSV
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">Attendance Saved</div>
    <div id="studentForm" style="display: none" class="student-form">
      <h3>Add Student</h3>

      <input type="number" id="newRoll" placeholder="Roll Number" />

      <input type="text" id="newName" placeholder="Student Name" />

      <button id="saveStudent">Save Student</button>
    </div>

    <script src="./index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
