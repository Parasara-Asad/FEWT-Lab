<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2</title>
</head>
<body>
    <script>
        let arr = [10,20,30,40];
        arr.push(50);
        document.write("Array push: "+arr)
        document.write("<hr/>")
        arr.pop()
        document.write("Array push: "+arr)
        document.write("<hr/>")
        arr.shift()
        document.write("Array shift: "+arr)
        document.write("<hr/>")
        arr.unshift(5)
        document.write("Array unshif: "+arr)
        document.write("<hr/>")
        arr.splice(2,1,25)
        document.write("Array splice: "+arr)
        document.write("<hr/>")
        document.write("Array slice: "+arr.slice(1,4))
        document.write("<hr/>")
        document.write("Array sort: "+[50,40,20,10].sort())
        document.write("<hr/>")
        document.write("Array reverse: "+arr.reverse())
        document.write("<hr/>")
        document.write("Array concat: "+arr.concat(60,70))
        document.write("<hr/>")
        document.write("Array concat: "+arr.concat(60,70))



        
    </script>
</body>
</html>
