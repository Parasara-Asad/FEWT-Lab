<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <style>
      .main {
        margin: 0px auto;
        height: 80vh;
        width: 25%;
        background-color: black;
        border: 2px solid black;
      }
      #display {
        margin: 10px;
        width: 90%;
        height: 5vh;
        text-align: end;
      }
      .box {
        display: flex;
        justify-content: space-evenly;
      }
      button {
        width: 20%;
        height: 30px;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <input type="text" id="display" readonly />
      <br />
      <br />
      <div class="box">
        <button onclick="Acclear()" id="clear">Ac</button>
        <button onclick="press('/')" id="oprestion">/</button>
        <button onclick="press('-')" id="oprestion">-</button>
        <button onclick="press('*')" id="oprestion">*</button>
      </div>
      <br /><br />
      <div class="box">
        <button onclick="press('7')" id="num">7</button>
        <button onclick="press('8')" id="num">8</button>
        <button onclick="press('9')" id="num">9</button>
        <button onclick="press('+')" id="oprestion">+</button>
      </div>
      <br /><br />
      <div class="box">
        <button onclick="press('4')" id="num">4</button>
        <button onclick="press('5')" id="num">5</button>
        <button onclick="press('6')" id="num">6</button>
        <button onclick="equal()" id="equal">=</button>
      </div>
      <br /><br />
      <div class="box">
        <button onclick="press('1')" id="num">1</button>
        <button onclick="press('2')" id="num">2</button>
        <button onclick="press('3')" id="num">3</button>
        <button onclick="press('0')" id="num">0</button>
      </div>
    </div>
    <script>
      let display = document.getElementById("display");
      function press(value) {
        display.value += value;
      }
      function Acclear() {
        display.value = " ";
      }
      function equal() {
        try {
          display.value = eval(display.value);
        } catch {
          display.value = "error";
        }
      }
    </script>
  </body>
</html>
