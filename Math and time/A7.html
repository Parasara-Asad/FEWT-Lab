<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A7</title>
</head>
<body>
    <script>
        function gettime(){
            let date = new Date();
            document.write(date.getHours() +" : "+ date.getMinutes() +" : "+date.getSeconds())
            document.write("<br/>")
        }
        setInterval(gettime,1000);
    </script>
</body>
</html>
